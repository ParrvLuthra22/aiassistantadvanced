# =============================================================================
# JARVIS Virtual Assistant Configuration
# =============================================================================
# This file contains all configuration options for the assistant.
# Environment variables can override these settings using the format:
# JARVIS_<SECTION>_<KEY> (e.g., JARVIS_VOICE_WAKE_WORD)
#
# TODO: Add configuration validation schema
# TODO: Add hot-reload support for runtime changes
# TODO: Add environment-specific overrides (dev, staging, prod)
# =============================================================================

# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------
general:
  # Assistant name and personality
  assistant_name: "FRIDAY"
  version: "0.1.0"
  
  # -------------------------------------------------------------------------
  # Logging Configuration
  # -------------------------------------------------------------------------
  # Log levels: TRACE, DEBUG, INFO, EVENT, WARNING, ERROR, CRITICAL
  # TRACE: Most verbose, shows internal operations
  # DEBUG: Detailed information for debugging
  # INFO: General operational messages
  # EVENT: Event bus traffic (custom level between INFO and WARNING)
  # WARNING: Warnings and potential issues
  # ERROR: Error conditions
  # CRITICAL: Critical failures
  log_level: "INFO"
  
  # Log format for human-readable console/file output
  # Available fields: %(asctime)s, %(levelname)s, %(name)s, %(message)s,
  #                   %(module)s, %(funcName)s, %(lineno)d
  log_format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
  
  # Log file path (relative to project root)
  # Set to null/empty to disable file logging
  log_file: "logs/friday.log"
  
  # Log rotation strategy: daily, size, none
  log_rotation: "daily"
  
  # Maximum log file size in MB (for size-based rotation)
  log_max_size_mb: 10
  
  # Number of backup log files to keep
  log_backup_count: 7
  
  # -------------------------------------------------------------------------
  # Debug Mode
  # -------------------------------------------------------------------------
  # Debug mode enables:
  # - Log level set to DEBUG
  # - Full event payloads logged (not just summaries)
  # - Additional internal state logging
  # - Performance timing for all operations
  # Can also be enabled via: JARVIS_DEBUG=1 environment variable
  debug_mode: false
  
  # -------------------------------------------------------------------------
  # Structured Logging (Machine-Readable)
  # -------------------------------------------------------------------------
  # Enable JSON-formatted logs for file output
  # JSON logs are written to logs/friday.json.log alongside human-readable logs
  # Useful for log aggregation (ELK, Loki, Splunk, CloudWatch)
  json_logs: false
  
  # -------------------------------------------------------------------------
  # Event Tracing
  # -------------------------------------------------------------------------
  # Enable event tracing for debugging event flow across agents
  # Records: event emissions, receipts, and handling with timing
  # Access via: EventTracer.get_instance().dump_text()
  event_tracing: true

# -----------------------------------------------------------------------------
# Voice Agent Configuration
# -----------------------------------------------------------------------------
voice:
  # Wake word settings
  wake_word: "friday"
  wake_word_sensitivity: 0.5  # 0.0 to 1.0
  
  # Vosk settings for wake word detection (lightweight, always-on)
  vosk:
    # Path to Vosk model directory (download from https://alphacephei.com/vosk/models)
    # Recommended: vosk-model-small-en-us-0.15 for wake word detection
    model_path: "models/vosk-model-small-en-us-0.15"
    # Sample rate must match model expectations
    sample_rate: 16000
  
  # Whisper.cpp settings for full transcription (high accuracy)
  whisper:
    # Path to whisper.cpp binary (build from https://github.com/ggerganov/whisper.cpp)
    binary_path: "/usr/local/bin/whisper-cpp"
    # Path to whisper model file (.bin format)
    # Recommended: ggml-base.en.bin for English-only, good accuracy
    model_path: "models/ggml-base.en.bin"
    # Language (use 'en' for English-only models)
    language: "en"
    # Number of threads for transcription
    threads: 4
    # Output format: txt, json, srt, vtt
    output_format: "json"
  
  # Speech recognition settings
  recognition:
    # Provider: 'vosk_whisper' (Vosk for wake word, whisper.cpp for transcription)
    provider: "vosk_whisper"
    
    # Audio settings
    sample_rate: 16000
    channels: 1
    chunk_duration_ms: 100
    
    # Recording buffer settings
    buffer_seconds: 0.5  # Audio buffer before wake word
    
    # Silence detection (for end of speech)
    silence_threshold: 500  # RMS threshold for silence
    silence_duration_ms: 1500  # How long to wait after speech ends
    max_recording_seconds: 30  # Maximum recording duration
    min_recording_seconds: 0.5  # Minimum recording to process
    
    # Voice Activity Detection (VAD)
    vad_aggressiveness: 2  # 0-3, higher = more aggressive filtering
  
  # Text-to-speech settings
  tts:
    # Preferred engine: kokoro (neural) with pyttsx3 fallback.
    engine: "kokoro"
    voice_id: "af_heart"

  # Always address owner as "Sir" in spoken responses.
  address_user_as_sir: true

  # Legacy synthesis block kept for backward compatibility.
  synthesis:
    # Provider fallback chain after Kokoro load failures.
    provider: "pyttsx3"
    voice: "Samantha"  # pyttsx3/macOS fallback voice
    rate: 180  # Words per minute
    volume: 1.0  # 0.0 to 1.0
    
    # Fallback to system TTS if pyttsx3 fails
    fallback_provider: "system"
    fallback_voice: "Samantha"

# -----------------------------------------------------------------------------
# Intent Agent Configuration
# -----------------------------------------------------------------------------
intent:
  # NLU provider: 'ollama', 'pattern', 'gemini', 'openai'
  provider: "ollama"
  
  # Gemini settings (if using Gemini provider)
  gemini:
    model: "gemini-2.0-flash"
    temperature: 0.3
    max_tokens: 500
    api_key: null
    # API key should be in environment: GEMINI_API_KEY
  
  # OpenAI settings (if using OpenAI provider)
  openai:
    model: "gpt-4"
    temperature: 0.3
    max_tokens: 500
    api_key: null
    # API key should be in environment: OPENAI_API_KEY

  # Ollama settings (local open-source model, no API key)
  ollama:
    model: "qwen2.5:7b-instruct"
    endpoint: "http://127.0.0.1:11434/api/generate"
    temperature: 0.2
  
  # Confidence thresholds
  confidence_threshold: 0.5  # Minimum confidence for intent matching
  ambiguity_threshold: 0.3  # If top 2 intents are within this, ask for clarification
  
  # Intent definitions
  intents:
    - name: "open_application"
      examples:
        - "open {app_name}"
        - "launch {app_name}"
        - "start {app_name}"
    
    - name: "search_web"
      examples:
        - "search for {query}"
        - "google {query}"
        - "look up {query}"
    
    - name: "set_reminder"
      examples:
        - "remind me to {task} at {time}"
        - "set a reminder for {task}"
    
    - name: "get_weather"
      examples:
        - "what's the weather"
        - "weather forecast"
        - "is it going to rain"
    
    - name: "control_volume"
      examples:
        - "set volume to {level}"
        - "turn it up"
        - "mute"
    
    # TODO: Add more intents as capabilities expand

# -----------------------------------------------------------------------------
# System Agent Configuration
# -----------------------------------------------------------------------------
system:
  # macOS integration settings
  macos:
    use_applescript: true
    use_shortcuts: true
    
    # Allowed applications (whitelist, empty = all allowed)
    allowed_apps: []
    
    # Blocked applications (blacklist)
    blocked_apps:
      - "Terminal"  # Prevent potentially dangerous terminal access
    
    # System commands that require confirmation
    confirm_actions:
      - "shutdown"
      - "restart"
      - "logout"
      - "delete"
  
  # External API access
  apis:
    weather:
      provider: "openweathermap"
      # API key should be in environment: OPENWEATHERMAP_API_KEY
      default_location: "auto"  # 'auto' uses IP geolocation
    
    # TODO: Add more API configurations

# -----------------------------------------------------------------------------
# Memory Agent Configuration
# -----------------------------------------------------------------------------
memory:
  # Storage backend: 'sqlite', 'redis', 'memory'
  backend: "sqlite"
  
  # SQLite settings
  sqlite:
    database_path: "data/memory.db"
  
  # Memory limits
  short_term:
    max_items: 100
    ttl_seconds: 3600  # 1 hour
  
  long_term:
    max_items: 10000
    # No TTL for long-term memory
  
  # Conversation memory
  conversation:
    max_turns: 20  # Remember last N conversation turns
    summarize_after: 10  # Summarize context after N turns
  
  # Vector store for semantic search (future)
  # TODO: Add vector database configuration
  vector_store:
    enabled: true
    provider: "chroma"  # 'chroma', 'pinecone', 'weaviate'
    persist_directory: "data/chroma_memory"
    collection_name: "friday_memory"
    embedding_model: null  # Optional: e.g. sentence-transformers/all-MiniLM-L6-v2
    chunk_size_tokens: 400
    chunk_overlap_tokens: 64

# -----------------------------------------------------------------------------
# Orchestrator Configuration
# -----------------------------------------------------------------------------
orchestrator:
  # Agent startup order (dependencies)
  startup_order:
    - "MemoryAgent"
    - "SystemAgent"
    - "VoiceAgent"
    - "IntentAgent"
    - "VisionAgent"      # Optional: only started if vision.enabled = true
  
  # Health check interval in seconds
  health_check_interval: 30
  
  # Task timeout in seconds
  default_task_timeout: 30
  
  # Retry settings
  max_retries: 3
  retry_delay_seconds: 1
  
  # Graceful shutdown timeout
  shutdown_timeout_seconds: 10

# -----------------------------------------------------------------------------
# Multi-step Reasoning Engine
# -----------------------------------------------------------------------------
reasoning:
  enabled: false

# -----------------------------------------------------------------------------
# Event Bus Configuration
# -----------------------------------------------------------------------------
event_bus:
  # Queue size for async event processing
  max_queue_size: 1000
  
  # Event persistence for debugging
  persist_events: false
  event_log_path: "data/events.log"
  
  # Metrics
  enable_metrics: true

# -----------------------------------------------------------------------------
# Security Settings
# -----------------------------------------------------------------------------
security:
  # API key management
  # All API keys should be in environment variables, not in this file
  
  # Command execution safety
  sandbox_commands: true
  max_command_length: 500
  
  # Rate limiting
  rate_limit:
    enabled: true
    max_requests_per_minute: 60
  face_auth:
    enabled: true
    camera_id: 0
    threshold: 0.78
    data_dir: "data/face_auth"
    owner_name: "parrv luthra"
    startup_delay_seconds: 1.2

# -----------------------------------------------------------------------------
# UI / HUD Configuration
# -----------------------------------------------------------------------------
ui:
  enabled: true
  hud:
    enabled: true
    # Geometry (pixels)
    width: 680
    height: 380
    collapsed_size: 112
    x: 24
    y: 24
    # Visual style
    alpha: 0.88
    background: "#0a0e1a"

# -----------------------------------------------------------------------------
# Vision Agent Configuration
# -----------------------------------------------------------------------------
# Computer vision capabilities using OpenCV and MediaPipe
# Provides gesture recognition and face detection/recognition
# 
# Required dependencies:
#   pip install opencv-python mediapipe face-recognition numpy
#
# Note: face-recognition requires dlib which needs cmake:
#   brew install cmake (macOS)
# -----------------------------------------------------------------------------
vision:
  # Enable/disable the VisionAgent
  # Set to true to enable camera-based gesture and face recognition
  enabled: true
  # Disable cloud Gemini vision; use local OCR fallback by default.
  use_gemini: false
  local_ocr_enabled: true
  
  # -------------------------------------------------------------------------
  # Camera Settings
  # -------------------------------------------------------------------------
  camera:
    # Camera device ID (0 = default camera, 1 = secondary, etc.)
    device_id: 0
    
    # Capture resolution [width, height]
    # Higher resolution = better recognition but slower processing
    resolution: [1280, 720]
    
    # Target frames per second
    # Lower FPS = less CPU usage
    fps: 30
    
    # Capture loop interval in milliseconds
    # How often to capture and process a frame
    capture_interval_ms: 100
    
    # Auto-start camera when VisionAgent starts
    # If false, camera starts only when "start vision" command is given
    auto_start: false
    
    # Show preview window with camera feed and detections
    # Set to true to see a window with hand/face tracking visualizations
    show_preview: true
  
  # -------------------------------------------------------------------------
  # Gesture Recognition (MediaPipe Hands)
  # -------------------------------------------------------------------------
  gestures:
    # Enable gesture detection
    enabled: true
    
    # Minimum detection confidence (0.0 - 1.0)
    # Higher = fewer false positives but may miss some gestures
    min_detection_confidence: 0.7
    
    # Minimum tracking confidence (0.0 - 1.0)
    min_tracking_confidence: 0.5
    
    # Maximum number of hands to detect
    max_num_hands: 2
    
    # Cooldown between same gesture detections (seconds)
    # Prevents rapid-fire events for the same gesture
    cooldown_seconds: 1.0
    
    # Supported gestures and their actions
    # Each gesture can trigger a specific action
    gesture_actions:
      thumbs_up: "confirm"      # Confirmation gesture
      thumbs_down: "cancel"     # Cancellation gesture
      open_palm: "stop"         # Stop/pause gesture
      fist: "dismiss"           # Dismiss notification
      peace: "screenshot"       # Take screenshot
      wave: "greeting"          # Greeting gesture
      pointing: "select"        # Selection/pointing gesture
  
  # -------------------------------------------------------------------------
  # Face Recognition
  # -------------------------------------------------------------------------
  face:
    # Enable face detection and recognition
    enabled: true
    
    # Use MediaPipe Face Detection (lightweight, always-on)
    use_mediapipe: true
    
    # Enable face recognition (requires face_recognition library)
    # This identifies specific people, not just detects faces
    enable_recognition: true
    
    # Minimum detection confidence for face detection
    min_detection_confidence: 0.5
    
    # Face recognition tolerance (lower = stricter matching)
    # Range: 0.0 - 1.0, recommended: 0.4 - 0.6
    recognition_tolerance: 0.5
    
    # Directory to store enrolled face data
    enrolled_faces_dir: "data/faces"
    
    # Cooldown between face detection events (seconds)
    detection_cooldown_seconds: 5.0
    
    # Cooldown between recognition events for same person (seconds)
    recognition_cooldown_seconds: 30.0
  
  # -------------------------------------------------------------------------
  # Performance Settings
  # -------------------------------------------------------------------------
  performance:
    # Downscale frames for processing (1.0 = no scaling)
    # Lower values = faster but less accurate
    processing_scale: 0.5
    
    # Use GPU acceleration if available
    use_gpu: false
    
    # Number of threads for processing
    num_threads: 2
  
  # -------------------------------------------------------------------------
  # Privacy Settings
  # -------------------------------------------------------------------------
  privacy:
    # Do not store any images to disk
    no_image_storage: true
    
    # Blur faces in any saved images/screenshots
    blur_faces_in_storage: true
    
    # Only process when explicitly started (not on boot)
    require_explicit_start: true


# -----------------------------------------------------------------------------
# Web Search Agent Configuration
# -----------------------------------------------------------------------------
web_search:
  # API key for Tavily Search
  tavily_api_key: null
  # You can also use env: TAVILY_API_KEY
  # LLM provider for query extraction/summarization: auto | gemini | openrouter | local
  llm_provider: "auto"
  gemini:
    api_key: null
    model: "gemini-1.5-flash"
  openrouter:
    api_key: null
    model: "x-ai/grok-3-mini-beta"
    endpoint: "https://openrouter.ai/api/v1/chat/completions"


# -----------------------------------------------------------------------------
# Image Generation Configuration
# -----------------------------------------------------------------------------
image:
  enabled: true
